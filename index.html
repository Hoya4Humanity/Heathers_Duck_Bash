<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heather's Duck Bash: Thunder Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --river-speed: 15s; }
        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            background: #050505; cursor: crosshair; user-select: none;
        }
        #game-stage {
            position: relative; width: 100vw; height: 100vh;
            background: #0d2b1d; display: flex; justify-content: center;
        }
        #river {
            position: relative; width: 75%; height: 100%;
            background-color: #154360;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 80px 80px;
            animation: scrollRiver var(--river-speed) linear infinite;
            overflow: hidden; border-left: 15px solid #0e351d; border-right: 15px solid #0e351d;
        }
        @keyframes scrollRiver { from { background-position: 0 0; } to { background-position: 0 1000px; } }
        
        .sprite { position: absolute; transform: translate(-50%, -50%); z-index: 20; pointer-events: none; }
        .projectile { 
            position: absolute; z-index: 30; pointer-events: none; 
            filter: drop-shadow(0 6px 4px rgba(0,0,0,0.4));
        }
        
        #ui-panel {
            position: absolute; top: 15px; left: 15px; color: #fff; z-index: 100;
            background: rgba(0,0,0,0.7); padding: 12px; border: 2px solid #f1c40f;
            font-size: 10px;
        }

        #weapon-dock {
            position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 100;
        }
        .weapon-btn {
            width: 55px; height: 55px; background: #111; border: 3px solid #444;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            cursor: pointer; transition: 0.1s;
        }
        .weapon-btn.active { border-color: #f1c40f; background: #222; transform: scale(1.1); box-shadow: 0 0 15px #f1c40f; }
        .weapon-btn.locked { opacity: 0.15; cursor: not-allowed; }

        #boss-bar-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 350px; height: 15px; background: #000; border: 2px solid #fff; display: none; z-index: 101;
        }
        #boss-hp { height: 100%; background: #e74c3c; width: 100%; transition: width 0.15s; }

        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; color: white; text-align: center;
        }
        #ai-overlay { background: rgba(0,0,0,0.6); }
        .compact-box {
            background: rgba(255,255,255,0.95); color: #000; padding: 15px; border-radius: 4px;
            max-width: 400px; border: 4px solid #f1c40f; font-size: 12px; line-height: 1.4;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .pixel-btn {
            background: #f1c40f; color: #000; padding: 10px 20px; border: 2px solid #000;
            cursor: pointer; font-size: 12px; margin-top: 15px;
        }
        .pixel-btn:hover { background: #fff; }

        #boss-portrait {
            width: 150px; height: 150px; border: 3px solid #f1c40f; margin-bottom: 10px;
            background: #000; display: flex; align-items: center; justify-content: center;
        }

        #loading-spinner { border: 4px solid rgba(0,0,0,0.1); border-top: 4px solid #f1c40f; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #level-toast {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #f1c40f; font-size: 20px; pointer-events: none; opacity: 0; z-index: 500;
        }
        .toast-animate { animation: toastIn 1.5s ease-out forwards; }
        @keyframes toastIn { 
            0% { opacity: 0; transform: translate(-50%, -20%); }
            20% { opacity: 1; transform: translate(-50%, -50%); }
            80% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -80%); }
        }
        
        #leaderboard-list {
            max-height: 150px; overflow-y: auto; width: 100%; margin: 10px 0;
            font-size: 8px; border-top: 1px solid #ddd; padding-top: 10px;
        }
        .entry { display: flex; justify-content: space-between; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="game-stage">
    <div id="river">
        <div id="weather-layer"></div>
    </div>
    <div id="level-toast">LEVEL UP!</div>
    <div id="ui-panel">
        <div class="mb-1 text-yellow-500">HEATHER'S BASH</div>
        <div class="mb-1">SCORE: <span id="score-val">00000</span></div>
        <div>LEVEL: <span id="level-val">1</span></div>
    </div>
    <div id="boss-bar-container">
        <div id="boss-title" class="text-[8px] absolute -top-5 left-0 text-white">THE QUACKEN</div>
        <div id="boss-hp"></div>
    </div>
    <div id="weapon-dock">
        <div class="weapon-btn active" id="btn-plunger">🪠</div>
        <div class="weapon-btn locked" id="btn-tp">🧻</div>
        <div class="weapon-btn locked" id="btn-turd">💩</div>
    </div>
</div>

<div id="start-screen" class="overlay">
    <div class="text-4xl mb-2 text-yellow-400">HEATHER'S</div>
    <div class="text-2xl mb-8 text-white">DUCK BASH</div>
    <input type="text" id="username-input" placeholder="NAME" class="bg-gray-800 text-white p-2 text-center border-2 border-yellow-500 mb-4 font-['Press_Start_2P'] text-[10px]" maxlength="10">
    <button class="pixel-btn" onclick="startGame()">START</button>
</div>

<div id="ai-overlay" class="overlay" style="display:none;">
    <div id="boss-portrait-container" style="display:none;">
        <div id="boss-portrait"></div>
    </div>
    <div class="compact-box">
        <div class="text-[8px] text-gray-400 mb-1">THUNDER MALLARD</div>
        <div id="ai-text">...</div>
        <div id="leaderboard-list"></div>
        <button id="resume-btn" class="pixel-btn" onclick="resumeGame()">PROCEED</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'heathers-duck-bash-final-prod';
    const apiKey = ""; 

    const river = document.getElementById('river');
    const scoreVal = document.getElementById('score-val');
    const levelVal = document.getElementById('level-val');
    const bossBar = document.getElementById('boss-bar-container');
    const bossHp = document.getElementById('boss-hp');
    const aiText = document.getElementById('ai-text');
    const usernameInput = document.getElementById('username-input');

    let state = {
        score: 0, level: 1, gameActive: false,
        ducks: [], projectiles: [], currentWeapon: 'plunger',
        boss: null, audioCtx: null, killsInLevel: 0,
        userName: "HEATHER", nextBossName: null
    };

    const initAuth = async () => {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }
    };
    initAuth();

    async function saveScore() {
        if (!auth.currentUser) return;
        try {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'scores'), {
                name: state.userName, score: state.score, level: state.level, timestamp: Date.now()
            });
        } catch(e) {}
    }

    function updateLeaderboardUI() {
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'scores'), (snap) => {
            let entries = [];
            snap.forEach(d => entries.push(d.data()));
            entries.sort((a,b) => b.score - a.score);
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = entries.slice(0, 5).map((e, i) => `
                <div class="entry"><span>${i+1}. ${e.name}</span><span>${e.score}</span></div>
            `).join('') || "No legends yet.";
        });
    }

    async function speak(text) {
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Say in the majestic, booming voice of Thor: ${text}` }] }],
                    generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Fenrir" } } } }
                })
            });
            const d = await res.json();
            const raw = d.candidates[0].content.parts[0].inlineData.data;
            const bin = atob(raw), bytes = new Int16Array(bin.length/2);
            for(let i=0; i<bin.length; i+=2) bytes[i/2] = (bin.charCodeAt(i+1)<<8)|bin.charCodeAt(i);
            const buf = state.audioCtx.createBuffer(1, bytes.length, 24000);
            buf.getChannelData(0).set(new Float32Array(bytes).map(v => v/32768));
            const s = state.audioCtx.createBufferSource(); s.buffer = buf; s.connect(state.audioCtx.destination); s.start();
        } catch(e) {}
    }

    async function getAIGuidance(isBoss = false) {
        const sys = "You are Thor in duck form. Provide JSON: 'msg' (short string). Be brief and epic.";
        const prompt = isBoss ? "A boss approaches." : "Weapon unlocked.";
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: sys }] },
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            const d = await res.json();
            const data = JSON.parse(d.candidates[0].content.parts[0].text);
            aiText.innerText = data.msg;
            if(isBoss) {
                state.nextBossName = "The Storm-Clucker";
                document.getElementById('boss-title').innerText = "BOSS: " + state.nextBossName;
                generatePortrait(state.nextBossName);
            }
            speak(data.msg);
        } catch(e) { aiText.innerText = "Prepare for glory!"; }
    }

    async function generatePortrait(name) {
        const pb = document.getElementById('boss-portrait');
        pb.innerHTML = '<div id="loading-spinner"></div>';
        document.getElementById('boss-portrait-container').style.display = 'block';
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ instances: { prompt: `Epic pixel art portrait of duck boss monster ${name}.` } })
            });
            const d = await res.json();
            pb.innerHTML = `<img src="data:image/png;base64,${d.predictions[0].bytesBase64Encoded}" class="w-full h-full object-cover">`;
        } catch(e) { pb.innerHTML = '🦆⚡'; }
    }

    function initAudio() { if(!state.audioCtx) state.audioCtx = new (AudioContext || webkitAudioContext)(); }
    function sfx(f, d, t='square', v=0.03) {
        if(!state.audioCtx) return;
        const o = state.audioCtx.createOscillator(), g = state.audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, state.audioCtx.currentTime);
        g.gain.setValueAtTime(v, state.audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, state.audioCtx.currentTime + d);
        o.connect(g); g.connect(state.audioCtx.destination);
        o.start(); o.stop(state.audioCtx.currentTime + d);
    }

    class Projectile {
        constructor(x, y, tx, ty, type) {
            this.el = document.createElement('div');
            this.el.className = 'projectile';
            this.el.innerHTML = type === 'plunger' ? '🪠' : (type === 'tp' ? '🧻' : '💩');
            this.el.style.fontSize = type === 'turd' ? '35px' : '22px';
            river.appendChild(this.el);
            this.x = x; this.y = y; this.scale = 0.4;
            const dx = tx - x, dy = ty - y, dist = Math.sqrt(dx*dx + dy*dy);
            this.vx = (dx/dist)*20; this.vy = (dy/dist)*20;
            this.active = true;
            this.damage = type === 'turd' ? 5 : 1;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.scale = Math.min(1.0, this.scale + 0.05);
            this.el.style.left = this.x+'px'; this.el.style.top = this.y+'px';
            this.el.style.transform = `scale(${this.scale}) rotate(${this.y*0.5}deg)`;
            if(this.y < -50 || this.y > 1200 || this.x < -50 || this.x > river.offsetWidth+50) this.destroy();
        }
        destroy() { this.active = false; this.el.remove(); }
    }

    class Duck {
        constructor(isBoss = false) {
            this.isBoss = isBoss;
            this.el = document.createElement('div');
            this.el.className = 'sprite';
            this.el.innerHTML = isBoss ? '🦖' : '🦆';
            this.el.style.fontSize = isBoss ? '120px' : '40px';
            river.appendChild(this.el);
            this.hp = isBoss ? (15 + state.level * 10) : 1;
            this.maxHp = this.hp;
            this.w = isBoss ? 120 : 40;
            this.reset();
        }
        reset() {
            this.x = Math.random() * (river.offsetWidth - 100) + 50;
            this.y = -100;
            this.vy = this.isBoss ? 0.8 : (1.5 + (state.level * 0.1));
            this.vx = (Math.random() - 0.5) * 5;
        }
        update() {
            this.y += this.vy; this.x += this.vx;
            if(this.x < this.w/2 || this.x > river.offsetWidth - this.w/2) {
                this.vx *= -1; sfx(100, 0.05, 'triangle');
            }
            this.el.style.left = this.x+'px'; this.el.style.top = this.y+'px';
            if(this.y > window.innerHeight + 100) this.reset();
        }
        hit(dmg) {
            this.hp -= dmg; sfx(this.isBoss ? 60 : 300, 0.1, 'sawtooth');
            if(this.isBoss) bossHp.style.width = (this.hp/this.maxHp*100)+'%';
            if(this.hp <= 0) {
                state.score += this.isBoss ? 1000 : 20;
                if(!this.isBoss) state.killsInLevel++;
                this.die(); return true;
            }
            return false;
        }
        die() {
            this.el.innerHTML = '⚡';
            setTimeout(() => { this.el.remove(); if(this.isBoss) { state.boss = null; bossBar.style.display = 'none'; levelUp(); } }, 150);
        }
    }

    function updateLoop() {
        if(!state.gameActive) return;
        state.projectiles.forEach(p => {
            p.update();
            if(state.boss && collides(p, state.boss)) { state.boss.hit(p.damage); p.destroy(); }
            else { state.ducks.forEach(d => { if(collides(p, d)) { d.hit(p.damage); p.destroy(); } }); }
        });
        state.projectiles = state.projectiles.filter(p => p.active);
        if(state.boss) state.boss.update();
        state.ducks.forEach(d => d.update());
        scoreVal.innerText = state.score.toString().padStart(5, '0');
        if(!state.boss && state.killsInLevel >= (5 + state.level * 2)) {
            if(state.level % 2 === 0) triggerBoss(); else levelUp();
        }
        requestAnimationFrame(updateLoop);
    }

    function collides(p, d) {
        const dx = p.x - d.x, dy = p.y - d.y;
        return Math.sqrt(dx*dx + dy*dy) < (d.isBoss ? 70 : 35);
    }

    window.startGame = () => {
        state.userName = usernameInput.value.trim() || "HEATHER";
        initAudio();
        document.getElementById('start-screen').style.display = 'none';
        state.gameActive = true;
        spawnDucks(); updateLoop();
    };

    function spawnDucks() {
        state.ducks.forEach(d => d.el.remove());
        state.ducks = [];
        const count = Math.min(4 + state.level, 10);
        for(let i=0; i<count; i++) state.ducks.push(new Duck());
    }

    function triggerBoss() {
        state.gameActive = false;
        document.getElementById('ai-overlay').style.display = 'flex';
        updateLeaderboardUI();
        getAIGuidance(true);
    }

    function levelUp() {
        state.level++;
        levelVal.innerText = state.level;
        const toast = document.getElementById('level-toast');
        toast.classList.remove('toast-animate');
        void toast.offsetWidth;
        toast.classList.add('toast-animate');
        sfx(440, 0.5, 'sine');
        saveScore();
        
        if(state.level === 2) {
            state.gameActive = false;
            document.getElementById('ai-overlay').style.display = 'flex';
            document.getElementById('btn-tp').classList.remove('locked');
            updateLeaderboardUI();
            getAIGuidance(false);
        } else if(state.level === 4) {
            state.gameActive = false;
            document.getElementById('ai-overlay').style.display = 'flex';
            document.getElementById('btn-turd').classList.remove('locked');
            updateLeaderboardUI();
            getAIGuidance(false);
        } else {
            spawnDucks();
        }
    }

    window.resumeGame = () => {
        document.getElementById('ai-overlay').style.display = 'none';
        state.gameActive = true;
        if(state.nextBossName) {
            state.boss = new Duck(true);
            state.nextBossName = null;
            bossBar.style.display = 'block';
        } else {
            spawnDucks();
        }
        updateLoop();
    };

    window.addEventListener('mousedown', (e) => {
        if(!state.gameActive) return;
        const r = river.getBoundingClientRect();
        const sx = r.width/2, sy = r.height - 80;
        const tx = e.clientX - r.left, ty = e.clientY - r.top;

        if(state.currentWeapon === 'plunger') {
            state.projectiles.push(new Projectile(sx, sy, tx, ty, 'plunger'));
            sfx(150, 0.1, 'sine');
        } else if(state.currentWeapon === 'tp') {
            state.projectiles.push(new Projectile(sx, sy, tx, ty, 'tp'));
            state.projectiles.push(new Projectile(sx, sy, tx-60, ty, 'tp'));
            state.projectiles.push(new Projectile(sx, sy, tx+60, ty, 'tp'));
            sfx(500, 0.05);
        } else if(state.currentWeapon === 'turd') {
            state.projectiles.push(new Projectile(sx, sy, tx, ty, 'turd'));
            sfx(50, 0.4, 'triangle', 0.1);
        }
    });

    document.getElementById('btn-plunger').onclick = () => selectWep('plunger');
    document.getElementById('btn-tp').onclick = () => { if(state.level >= 2) selectWep('tp'); };
    document.getElementById('btn-turd').onclick = () => { if(state.level >= 4) selectWep('turd'); };

    function selectWep(w) {
        state.currentWeapon = w;
        document.querySelectorAll('.weapon-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${w}`).classList.add('active');
        sfx(440, 0.1);
    }
</script>
</body>
</html>
